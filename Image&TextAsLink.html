    <h2>Image Link</h2>

    <a href="https://www.wikipedia.org/">
    <img border="0" alt="Wikipedia"
    src="https://upload.wikimedia.org/wikipedia/commons/b/b3/Wikipedia-logo-v2-en.svg"
    width="100" height="100">
    </a>
    <br>

    <h2>Text Link</h2>
    <a href="https://www.wikipedia.org">Open Wikipedia</a>
    <br>

    <h2>Image Link</h2>
    <a href="https://chatgpt.com/">
    <img border="0" alt="ChatGPT"
    src="https://chatgpt.com/favicon.ico" width="100" height="100">
    </a>
    <br>

    <h2>Text Link</h2>
    <a href="https://chatgpt.com">Open ChatGPT</a>
    <br><br>

    <h2>Image Map</h2>
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Example.svg" width="300" height="200" usemap="#imagemap" alt="Interactive example image with links to Wikipedia and ChatGPT">
    <map name="imagemap">
    <area shape="rect" coords="0,0,150,200"
    href="https://www.wikipedia.org" alt="Wikipedia">

    <area shape="rect" coords="150,0,300,200"
    href="https://chatgpt.com" alt="ChatGPT">
    </map>
    <br><br>
